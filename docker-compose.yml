services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hajjdb
      POSTGRES_USER: hajj
      POSTGRES_PASSWORD: hajj
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hajj -d hajjdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/hajjdb
      SPRING_DATASOURCE_USERNAME: hajj
      SPRING_DATASOURCE_PASSWORD: hajj
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      ADMIN_API_KEY: ${ADMIN_API_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
