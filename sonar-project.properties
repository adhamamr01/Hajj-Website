# SonarCloud project configuration
# Replace the values below with your actual SonarCloud organization and project key.
# These are set when you create the project at https://sonarcloud.io

sonar.projectKey=YOUR_SONAR_PROJECT_KEY
sonar.organization=YOUR_SONAR_ORGANIZATION

sonar.projectName=Hajj Guide Website
sonar.projectVersion=1.0

# Source roots (backend Java + frontend TypeScript)
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java

# Compiled Java classes (needed for accurate Java analysis)
sonar.java.binaries=backend/target/classes
sonar.java.source=21

sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  frontend/dist/**,\
  backend/target/**,\
  **/*.min.js

# Tell SonarCloud these are the test file patterns
sonar.test.inclusions=**/*Test*.java,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
