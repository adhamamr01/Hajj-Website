spring.datasource.url=jdbc:postgresql://localhost:5432/hajjdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=hajj
spring.datasource.password=hajj
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway manages schema and seed data
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Caffeine cache: max 1000 entries, expire after 1 hour
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=3600s
spring.cache.cache-names=meeqat,journey,boundaries,boundaryPoints

server.port=8080
