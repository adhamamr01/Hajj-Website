spring.datasource.url=jdbc:postgresql://localhost:5432/hajjdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=hajj
spring.datasource.password=hajj

# Flyway manages schema and seed data
# Hibernate validates the schema on startup (Hibernate 7 auto-detects the dialect)
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=8080

# Admin API key — must be set via ADMIN_API_KEY env var (no default — missing key = startup failure)
app.admin.api-key=${ADMIN_API_KEY}

# Actuator: expose only the health endpoint (used by Render health check)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
