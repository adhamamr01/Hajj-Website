# Production overrides — values supplied as Render environment variables.
# Set these in the Render dashboard under Environment:
#   SPRING_DATASOURCE_URL      = jdbc:postgresql://<host>:<port>/<dbname>
#   SPRING_DATASOURCE_USERNAME = <db user>
#   SPRING_DATASOURCE_PASSWORD = <db password>
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
# The Render DB already has tables created by the old Hibernate setup but no
# flyway_schema_history table.  baseline-on-migrate stamps the existing schema
# as version 0 so Flyway can then apply V1 (which is idempotent) cleanly.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.h2.console.enabled=false
